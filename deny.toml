# cargo-deny configuration — supply-chain and licence gate.
[graph]
all-features = false
# The fuzz crate is a standalone workspace; only check the main workspace.
exclude = ["protobuf-forensic-fuzz"]

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
# This crate is Apache-2.0; permit only permissive, non-copyleft licences. The
# list spans protobuf-forensic-core (zero deps) and the protobuf-forensic tree pulled in
# by timeglyph (jiff, forensicnomicon, serde): MPL-2.0/Unicode/CC0/BSL appear
# there, all permissive/weak-copyleft and acceptable in a permissive tree.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "ISC",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
